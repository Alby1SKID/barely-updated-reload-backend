<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Reload</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap">
    <link rel="icon" href="/Images/reload.ico" type="image/x-icon">
    <style>
        :root {
            --primary: #00f0ff;
            --primary-dark: #0077ff;
            --bg-dark: #0a0a12;
            --bg-darker: #050508;
            --bg-light: #f5f5ff;
            --text-light: #e0e0ff;
            --text-dark: #111122;
            --card-dark: rgba(20, 20, 40, 0.8);
            --card-light: rgba(240, 240, 255, 0.9);
            --success: #00ff88;
            --error: #ff3366;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--primary-dark) 0%, transparent 70%);
            opacity: 0.1;
            animation: pulse 15s infinite alternate;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: translate(0, 0); }
            50% { transform: translate(10%, 10%); }
            100% { transform: translate(-10%, -10%); }
        }

        .register-container {
            background: var(--card-dark);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .register-container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            z-index: -1;
            border-radius: 18px;
            animation: borderRotate 6s linear infinite;
            opacity: 0.7;
        }

        @keyframes borderRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .signin-text {
            color: rgba(200, 200, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 30px;
            display: block;
        }

        .input-container {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-container label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-container input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(10, 10, 20, 0.5);
            color: var(--text-light);
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .input-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.2);
        }

        .input-container input::placeholder {
            color: rgba(200, 200, 255, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(200, 200, 255, 0.5);
            transition: var(--transition);
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        input[type="submit"] {
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: var(--bg-darker);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.4);
        }

        input[type="submit"]:active {
            transform: translateY(0);
        }

        .theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-dark);
            border: 1px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--primary);
        }

        .theme-toggle i {
            font-size: 1.2rem;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 15px;
            font-size: 0.8rem;
            color: rgba(200, 200, 255, 0.5);
            background: linear-gradient(to top, rgba(10, 10, 20, 0.8), transparent);
        }

        .error-message {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--error);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 5px 15px rgba(255, 51, 102, 0.3);
            max-width: 90%;
            width: auto;
            opacity: 0;
            transition: var(--transition);
            z-index: 1000;
        }

        .error-message.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .error-message.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
        }

        .close-error {
            margin-left: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
        }

        .close-error:hover {
            transform: scale(1.2);
        }

   
        body.light-theme {
            background: var(--bg-light);
            color: var(--text-dark);
        }

        body.light-theme::before {
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            opacity: 0.05;
        }

        body.light-theme .register-container {
            background: var(--card-light);
            color: var(--text-dark);
        }

        body.light-theme .input-container input {
            background: rgba(245, 245, 255, 0.8);
            color: var(--text-dark);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.light-theme .input-container input:focus {
            border-color: var(--primary-dark);
        }

        body.light-theme .signin-text {
            color: rgba(0, 0, 50, 0.6);
        }

        body.light-theme .toggle-password {
            color: rgba(0, 0, 50, 0.4);
        }

        body.light-theme .toggle-password:hover {
            color: var(--primary-dark);
        }

        body.light-theme footer {
            color: rgba(0, 0, 50, 0.5);
            background: linear-gradient(to top, rgba(240, 240, 255, 0.8), transparent);
        }

    
        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
                margin: 0 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="dark-theme">
    <div class="register-container">
        <h1>CREATE ACCOUNT</h1>

        <div id="error-message" class="error-message hidden">
            <span id="error-text"></span>
            <span class="close-error" onclick="closeErrorMessage()">✖</span>
        </div>

        <form id="registerForm">

            <div class="input-container">
                <label for="email">EMAIL</label>
                <input type="email" id="email" placeholder="your.email@example.com" required>
            </div>
            <div class="input-container">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <span class="toggle-password" onclick="togglePasswordVisibility()"><i class="fas fa-eye"></i></span>
            </div>
            <input type="submit" id="submitBtn" value="REGISTER">
        </form>
    </div>

    <button class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </button>

    <footer>
        Powered by Reload Backend | ©2025 | v2
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const discordId = params.get('discordId');
            const username = params.get('username');

            if (username) {
                document.getElementById('username').value = username;
            }

            document.getElementById('registerForm').addEventListener('submit', function(event) {
                event.preventDefault();
                
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true; 
                submitBtn.value = "PROCESSING..."; 

                const username = document.getElementById('username').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                fetch('/register-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ discordId, username, email, password })
                }).then(response => response.json())
                  .then(data => {
                      if (data.success) {
                          window.location.href = '/';
                      } else {
                          showErrorMessage(data.message);
                          submitBtn.disabled = false; 
                          submitBtn.value = "REGISTER"; 
                      }
                  }).catch(error => {
                      console.error('Error:', error);
                      showErrorMessage('Server connection error. Please try again.');
                      submitBtn.disabled = false; 
                      submitBtn.value = "REGISTER"; 
                  });
            });

            const themeToggle = document.getElementById('themeToggle');
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light-theme');
                document.body.classList.toggle('dark-theme');
                
                const icon = themeToggle.querySelector('i');
                if (document.body.classList.contains('light-theme')) {
                    icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                } else {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                }
            });
        });

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.querySelector('.toggle-password i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        function showErrorMessage(message) {
            const errorMessageDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            
            errorText.textContent = message;
            errorMessageDiv.classList.remove('hidden');
            errorMessageDiv.classList.add('visible');

            setTimeout(() => {
                closeErrorMessage();
            }, 5000);
        }

        function closeErrorMessage() {
            const errorMessageDiv = document.getElementById('error-message');
            errorMessageDiv.classList.remove('visible');
            errorMessageDiv.classList.add('hidden');
        }
    </script>
</body>
</html>
