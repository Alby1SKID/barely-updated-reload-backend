<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/Images/reload.ico" type="image/x-icon">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }
        .register-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: black;
            font-size: 14px;
            padding: 10px;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="register-container">
        <h1>REGISTER</h1>
        <p class="signin-text">Creates an account on reload backend</p>

        <div id="error-message" class="error-message hidden">
            <span id="error-text"></span>
            <span class="close-error" onclick="closeErrorMessage()"></span>
        </div>

        <form id="registerForm">
            <div class="input-container">
                <input type="text" id="username" placeholder="Reload Username" required>
            </div>
            <div class="input-container">
                <input type="email" id="email" placeholder="Reload Email" required>
            </div>
            <div class="input-container">
                <input type="password" id="password" placeholder="Reload Password" required>
                <span class="toggle-password" onclick="togglePasswordVisibility()">👁️</span>
            </div>
            <input type="submit" id="submitBtn" value="Create Your Reload Account">
        </form>
    </div>

    <footer>
        Powered by Reload Backend - © 2025
    </footer>
</body>
</html>
